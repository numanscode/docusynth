<!DOCTYPE html>
<html lang="en" class="bg-[#050508]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocuSynth</title>
    <meta name="description" content="Forensic-grade document synthesis and pixel reconstruction engine.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ef4444;
            --magenta: #dc2626;
            --bg: #050508;
            --card-bg: rgba(10, 10, 15, 0.8);
            --card-border: rgba(239, 68, 68, 0.15);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #e5e7eb; 
            margin: 0; 
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(239, 68, 68, 0.15), transparent 60%),
                radial-gradient(circle at 0% 100%, rgba(220, 38, 38, 0.05), transparent 40%);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Dashboard Glassmorphism */
        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.7);
        }

        .glass-panel { 
            background: rgba(8, 8, 11, 0.98); 
            backdrop-filter: blur(40px);
        }

        /* Metallic Text Styling */
        .text-silver {
            background: linear-gradient(180deg, #ffffff 0%, #d1d5db 45%, #9ca3af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.3));
            font-weight: 800;
        }

        .shimmer-bg { 
            background: linear-gradient(90deg, #991b1b, #ef4444, #991b1b); 
            background-size: 200% 100%; 
            animation: shimmer 3s infinite linear; 
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* Red Aura Glow */
        .glow-aura {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 1000px;
            height: 300px;
            background: radial-gradient(ellipse at center, rgba(239, 68, 68, 0.1), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(239, 68, 68, 0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(239, 68, 68, 0.4); }

        .ds-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(239, 68, 68, 0.1);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .ds-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        .btn-red {
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 20px -5px rgba(239, 68, 68, 0.5);
            border: none;
            border-radius: 16px;
        }

        .btn-red:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -5px rgba(239, 68, 68, 0.6);
            filter: brightness(1.1);
        }
        
        .fade-in { animation: fadeIn 1s cubic-bezier(0.2, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.2.3",
    "react-dom": "https://esm.sh/react-dom@19.2.3",
    "react-dom/client": "https://esm.sh/react-dom@19.2.3/client",
    "@google/genai": "https://esm.sh/@google/genai@1.34.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body class="overflow-hidden">
    <div class="glow-aura"></div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
