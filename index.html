
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuSynth Pro | Synthesis Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050508;
            color: #e5e7eb;
            overflow: hidden;
            margin: 0;
        }
        .mono { font-family: 'JetBrains+Mono', monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050508; }
        ::-webkit-scrollbar-thumb { background: #1a0a0a; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }
        
        .red-glow { box-shadow: 0 0 25px rgba(239, 68, 68, 0.1); }
        .glass-panel {
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(239, 68, 68, 0.05);
        }

        .input-dark {
            background: rgba(8, 8, 10, 0.95);
            border: 1px solid rgba(239, 68, 68, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-dark:focus {
            border-color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.15);
            background: rgba(13, 13, 15, 1);
        }

        @keyframes scanline {
            0% { top: -150px; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scanline {
            width: 100%;
            height: 150px;
            background: linear-gradient(0deg, transparent, rgba(239, 68, 68, 0.05), rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05), transparent);
            position: absolute;
            animation: scanline 6s linear infinite;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes progress-shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-bg {
            background: linear-gradient(90deg, #b91c1c, #ef4444, #b91c1c);
            background-size: 200% 100%;
            animation: progress-shimmer 2s infinite linear;
        }
        
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .animate-slide-in-right {
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",

    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",

    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <!-- Entry point for the React application -->
    <script type="module" src="./index.tsx"></script>
</body>
</html>
