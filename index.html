<!DOCTYPE html>
<html lang="en" class="bg-[#050508]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Docusynth V6</title>
    <meta name="description" content="Premium AI document workstation platform by Docxman x Nxman.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        violet: {
                            50: '#fff0f7',
                            100: '#ffe0f0',
                            200: '#ffc2e1',
                            300: '#ff94c9',
                            400: '#ff57a7',
                            500: '#ff0080',
                            600: '#d9006c',
                            700: '#b30059',
                            800: '#8c0046',
                            900: '#660033',
                            950: '#3d001f',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0080;
            --magenta: #ff0080;
            --neon-purple: #8000ff;
            --bg: #08020a;
            --card-bg: rgba(12, 4, 18, 0.85);
            --card-border: rgba(255, 0, 128, 0.15);
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: #e5e7eb; 
            margin: 0; 
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(255, 0, 128, 0.15), transparent 60%),
                radial-gradient(circle at 0% 100%, rgba(128, 0, 255, 0.1), transparent 40%),
                radial-gradient(circle at 100% 0%, rgba(255, 0, 200, 0.05), transparent 40%);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Dashboard Glassmorphism */
        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(32px) saturate(200%);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.9);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .glass-card:hover {
            border-color: rgba(255, 0, 128, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 30px 80px -20px rgba(255, 0, 128, 0.2);
        }

        .glass-panel { 
            background: rgba(6, 2, 8, 0.99); 
            backdrop-filter: blur(60px);
        }

        /* Metallic Text Styling (Chrome effect from image) */
        .text-silver {
            background: linear-gradient(180deg, #ffffff 0%, #ffc0e0 45%, #d9006c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            filter: drop-shadow(0 0 10px rgba(255, 0, 128, 0.3));
        }

        .shimmer-bg { 
            background: linear-gradient(90deg, #d9006c, #ff0080, #d9006c); 
            background-size: 200% 100%; 
            animation: shimmer 3s infinite linear; 
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* Neon Aura Glow */
        .glow-aura {
            position: fixed;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 1200px;
            height: 400px;
            background: radial-gradient(ellipse at center, rgba(255, 0, 128, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 0, 128, 0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 0, 128, 0.4); }

        .ds-input {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 0, 128, 0.1);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            color: white;
        }

        .ds-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(255, 0, 128, 0.2);
        }

        .btn-violet {
            background: linear-gradient(135deg, #ff0080 0%, #8000ff 100%);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 8px 30px -5px rgba(255, 0, 128, 0.4);
            border: none;
            border-radius: 20px;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn-violet:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px -5px rgba(255, 0, 128, 0.6);
            filter: brightness(1.2);
        }

        .btn-violet:active {
            transform: translateY(0);
        }
        
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.2, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.2.3",
    "react-dom": "https://esm.sh/react-dom@19.2.3",
    "react-dom/client": "https://esm.sh/react-dom@19.2.3/client",
    "@google/genai": "https://esm.sh/@google/genai@1.34.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body class="bg-[#08020a]">
    <div class="glow-aura"></div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
